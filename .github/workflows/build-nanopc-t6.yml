name: Build nanopc-t6 Armbian Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # ubuntu-24.04-arm, ubuntu-24.04-riscv
    steps:
      - uses: armbian/build@main
        with:
          armbian_token: ${{ secrets.GITHUB_TOKEN }}
          armbian_board: "nanopct6" # orangepi5 bananapif3
          armbian_release: "trixie" # trixie
          armbian_target: "build"
          armbian_kernel_branch: "vendor"
          armbian_ui: "budgie" # server xfce
          armbian_runner_clean: "yes" # recommended for Github runners
